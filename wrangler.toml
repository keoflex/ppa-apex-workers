# PPA+ APEX — Cloudflare Workers Configuration
# Strike Engine: Queue consumer + Durable Object for HITL state

name = "ppa-apex-workers"
main = "src/index.ts"
compatibility_date = "2025-02-24"
compatibility_flags = [ "global_fetch_strictly_public" ]
account_id = "78ea385b814960bac401db0341907944"

# ── Environment Variables ──
# NOTE: this [vars] block ships to the DEPLOYED worker. ENVIRONMENT must be "production"
# so the weekly digest posts to the live platform, not http://localhost:3000.
# Use `wrangler dev` with .dev.vars to override locally.
[vars]
ENVIRONMENT = "production"
SES_CONFIGURATION_SET = "my-first-configuration-set"
FORCE_EXA_RESEARCH = "false"

# Secrets (set via `wrangler secret put`):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# GEMINI_API_KEY
# EXA_API_KEY
# APOLLO_API_KEY
# SMARTLEAD_API_KEY
# WORKER_SECRET
# AWS_ACCESS_KEY_ID
# AWS_SECRET_ACCESS_KEY
# AWS_REGION
# SES_CONFIGURATION_SET (optional — for open/click tracking)

# ── Durable Objects (Deprecated) ──
# [durable_objects]
# bindings = [
#   { name = "HITL_GATE", class_name = "HitlGateDurableObject" }
# ]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HitlGateDurableObject"]

[[migrations]]
tag = "v2"
deleted_classes = ["HitlGateDurableObject"]

# ── Queues ──
[[queues.producers]]
queue = "strike-pipeline"
binding = "STRIKE_QUEUE"

[[queues.consumers]]
queue = "strike-pipeline"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 50
# Give transient failures (SES throttling, Gemini 5xx) more attempts before a message is dropped.
max_retries = 5

[[queues.producers]]
queue = "mobile-priority"
binding = "MOBILE_QUEUE"

[[queues.consumers]]
queue = "mobile-priority"
max_batch_size = 1
max_batch_timeout = 1
max_concurrency = 100
max_retries = 5

# Runs every 15 minutes, 24/7/365
[triggers]
crons = ["*/15 * * * *"]

# ── R2 Storage ──
[[r2_buckets]]
binding = "CRM_ATTACHMENTS"
bucket_name = "crm-attachments"
